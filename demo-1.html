<script>
// ============================================================
// AGORA — Standalone HTML version
// ============================================================

const COLORS = {
  cluster:["#6366f1","#f59e0b","#ec4899","#14b8a6","#f97316"],
  agree:"#22c55e",disagree:"#ef4444",pass:"#64748b",
  consensus:"#22d3ee",bridging:"#a78bfa",commit:"#f59e0b",
  accent:"#6366f1",border:"#2a2a3d",bg:"#0a0a0f",surface:"#14141f",
  text:"#e8e8f0",textMuted:"#8888a8",textDim:"#5a5a78"
};

const PHASES=["dream","shape","commit","reflect"];
const PC={
  dream:{label:"Dream",icon:"✦",color:"#6366f1",headline:"What possibilities excite you?",desc:"Share ideas freely. Vote on others' contributions. Everything is on the table.",submitLabel:"ADD YOUR VOICE",submitPH:"Share an idea, wish, or wild possibility...",submitHint:"Dream big. No idea is too ambitious here.",defaultTab:"vote",canSubmit:true,canVote:true,showMap:true},
  shape:{label:"Shape",icon:"◈",color:"#f59e0b",headline:"See the landscape. Refine the vision.",desc:"The community's opinion map is revealed. See where groups form, what bridges them, and where consensus lives.",submitLabel:"RESPOND TO THE MAP",submitPH:"Now that you see the landscape, what would bridge the gaps?",submitHint:"Focus on synthesis, nuance, and bridging.",defaultTab:"map",canSubmit:true,canVote:true,showMap:true},
  commit:{label:"Commit",icon:"◆",color:"#f59e0b",headline:"From ideas to action.",desc:"These are the things your community agrees on. Signal what you'll help make happen.",submitLabel:"PROPOSE AN ACTION",submitPH:"How could we make one of these consensus ideas real?",submitHint:"Be specific. Who, what, when.",defaultTab:"consensus",canSubmit:true,canVote:true,showMap:false},
  reflect:{label:"Reflect",icon:"○",color:"#a78bfa",headline:"What did we learn?",desc:"The conversation is complete. Review the results and share reflections for next time.",submitLabel:"SHARE A REFLECTION",submitPH:"What surprised you? What would you do differently?",submitHint:"These reflections seed the next conversation.",defaultTab:"consensus",canSubmit:true,canVote:false,showMap:true}
};

const MIN_VOTES=5;

// ============================================================
// STATE
// ============================================================
let state={
  view:"loading",conv:null,stmts:[],votes:[],parts:[],commits:[],
  user:null,isFac:false,analysis:null,analyzing:false,
  curStmt:null,votedIds:new Set(),newStmt:"",selCluster:null,
  nameIn:"",topicIn:"",seedIn:"",tab:"vote"
};

function getPhase(){return state.conv?.phase||"dream"}
function getPc(){return PC[getPhase()]}

// ============================================================
// STORAGE (localStorage for standalone)
// ============================================================
const PREFIX="agora:";
function sGet(k){try{const v=localStorage.getItem(PREFIX+k);return v?JSON.parse(v):null}catch{return null}}
function sSet(k,v){try{localStorage.setItem(PREFIX+k,JSON.stringify(v))}catch(e){console.error(e)}}
function pGet(k){try{const v=localStorage.getItem(PREFIX+"p:"+k);return v?JSON.parse(v):null}catch{return null}}
function pSet(k,v){try{localStorage.setItem(PREFIX+"p:"+k,JSON.stringify(v))}catch(e){console.error(e)}}

// ============================================================
// MATH
// ============================================================
function matMul(A,B){const m=A.length,n=B[0].length,p=B.length;const C=Array.from({length:m},()=>new Float64Array(n));for(let i=0;i<m;i++)for(let k=0;k<p;k++)if(A[i][k]!==0)for(let j=0;j<n;j++)C[i][j]+=A[i][k]*B[k][j];return C}
function transpose(A){const m=A.length,n=A[0].length;const T=Array.from({length:n},()=>new Float64Array(m));for(let i=0;i<m;i++)for(let j=0;j<n;j++)T[j][i]=A[i][j];return T}
function vecNorm(v){let s=0;for(let i=0;i<v.length;i++)s+=v[i]*v[i];return Math.sqrt(s)}
function vecNormalize(v){const n=vecNorm(v);return n===0?v.slice():v.map(x=>x/n)}
function vecDot(a,b){let s=0;for(let i=0;i<a.length;i++)s+=a[i]*b[i];return s}

function powerIterationPCA(data,k=2){
  const n=data.length;if(n===0||data[0].length===0)return{components:[],projected:[]};
  const d=data[0].length,means=new Float64Array(d);
  for(let i=0;i<n;i++)for(let j=0;j<d;j++)means[j]+=data[i][j];
  for(let j=0;j<d;j++)means[j]/=n;
  const centered=data.map(r=>r.map((v,j)=>v-means[j]));
  const XT=transpose(centered),XTX=matMul(XT,centered);
  const components=[];
  for(let c=0;c<Math.min(k,d);c++){
    let v=Array.from({length:d},()=>Math.random()-.5);v=vecNormalize(v);
    for(let it=0;it<100;it++){
      const nv=new Float64Array(d);
      for(let i=0;i<d;i++)for(let j=0;j<d;j++)nv[i]+=XTX[i][j]*v[j];
      for(const prev of components){const dot=vecDot(nv,prev);for(let i=0;i<d;i++)nv[i]-=dot*prev[i]}
      v=vecNormalize(Array.from(nv));
    }
    components.push(v);
  }
  return{components,projected:centered.map(r=>components.map(comp=>vecDot(r,comp)))};
}

function kmeans(pts,k){
  const n=pts.length;if(n<=k)return pts.map((_,i)=>i);
  const dim=pts[0].length,cents=[];
  cents.push([...pts[Math.floor(Math.random()*n)]]);
  for(let c=1;c<k;c++){
    const ds=pts.map(p=>{let m=Infinity;for(const ct of cents){let d=0;for(let j=0;j<dim;j++)d+=(p[j]-ct[j])**2;m=Math.min(m,d)}return m});
    const tot=ds.reduce((a,b)=>a+b,0);let r=Math.random()*tot,ch=0;
    for(let i=0;i<n;i++){r-=ds[i];if(r<=0){ch=i;break}}
    cents.push([...pts[ch]]);
  }
  let asgn=new Array(n).fill(0);
  for(let it=0;it<50;it++){
    let changed=false;
    for(let i=0;i<n;i++){let bK=0,bD=Infinity;for(let c=0;c<k;c++){let d=0;for(let j=0;j<dim;j++)d+=(pts[i][j]-cents[c][j])**2;if(d<bD){bD=d;bK=c}}if(asgn[i]!==bK){changed=true;asgn[i]=bK}}
    if(!changed)break;
    for(let c=0;c<k;c++){const m=[];for(let i=0;i<n;i++)if(asgn[i]===c)m.push(i);if(m.length===0)continue;for(let j=0;j<dim;j++)cents[c][j]=m.reduce((s,i)=>s+pts[i][j],0)/m.length}
  }
  return asgn;
}

function silhouette(pts,asgn,k){
  const n=pts.length;if(n<=k)return-1;const dim=pts[0].length;
  const dist=(a,b)=>{let s=0;for(let j=0;j<dim;j++)s+=(a[j]-b[j])**2;return Math.sqrt(s)};
  let tot=0;
  for(let i=0;i<n;i++){
    const ci=asgn[i],same=[],others={};
    for(let j=0;j<n;j++){if(j===i)continue;if(asgn[j]===ci)same.push(j);else{if(!others[asgn[j]])others[asgn[j]]=[];others[asgn[j]].push(j)}}
    const a=same.length>0?same.reduce((s,j)=>s+dist(pts[i],pts[j]),0)/same.length:0;
    let b=Infinity;for(const cId of Object.keys(others)){const m=others[cId];b=Math.min(b,m.reduce((s,j)=>s+dist(pts[i],pts[j]),0)/m.length)}
    if(b===Infinity)b=0;tot+=Math.max(a,b)===0?0:(b-a)/Math.max(a,b);
  }
  return tot/n;
}

function bestKMeans(pts){
  if(pts.length<4)return{assignments:pts.map(()=>0),k:1,silhouette:0};
  let bS=-Infinity,bA=null,bK=2;
  for(let k=2;k<=Math.min(5,pts.length-1);k++)
    for(let r=0;r<3;r++){const a=kmeans(pts,k),s=silhouette(pts,a,k);if(s>bS){bS=s;bA=a;bK=k}}
  return{assignments:bA,k:bK,silhouette:bS};
}

// Polis metrics
function computeConsensus(stmts,votes,parts,asgn,k){
  return stmts.map(st=>{
    let prod=1;
    for(let g=0;g<k;g++){const gP=parts.filter((_,i)=>asgn[i]===g);const gV=gP.map(p=>votes.find(v=>v.participantId===p.id&&v.statementId===st.id)).filter(Boolean);prod*=(1+gV.filter(v=>v.value===1).length)/(2+gV.length)}
    const tv=votes.filter(v=>v.statementId===st.id);
    return{...st,consensusScore:prod,agreeRate:tv.length>0?tv.filter(v=>v.value===1).length/tv.length:0,totalVotes:tv.length};
  });
}

function computeRepr(stmts,votes,parts,asgn,k){
  const res={};
  for(let g=0;g<k;g++){
    const gIds=new Set(parts.filter((_,i)=>asgn[i]===g).map(p=>p.id));
    res[g]=stmts.map(st=>{
      const gV=votes.filter(v=>v.statementId===st.id&&gIds.has(v.participantId));
      const ngV=votes.filter(v=>v.statementId===st.id&&!gIds.has(v.participantId));
      const pG=(1+gV.filter(v=>v.value===1).length)/(2+gV.length);
      const pNG=(1+ngV.filter(v=>v.value===1).length)/(2+ngV.length);
      return{...st,repr:pNG>0?pG/pNG:pG,groupAgreeRate:gV.length>0?gV.filter(v=>v.value===1).length/gV.length:0};
    }).sort((a,b)=>b.repr-a.repr);
  }
  return res;
}

function computeBridging(stmts,votes,parts,asgn,k,proj){
  if(k<2)return stmts.map(s=>({...s,bridgingScore:0}));
  const cents=[];for(let g=0;g<k;g++){const m=proj.filter((_,i)=>asgn[i]===g);cents.push(m.length===0?[0,0]:[m.reduce((s,p)=>s+p[0],0)/m.length,m.reduce((s,p)=>s+p[1],0)/m.length])}
  return stmts.map(st=>{
    let bs=0,pc=0;
    for(let g1=0;g1<k;g1++)for(let g2=g1+1;g2<k;g2++){
      const i1=new Set(parts.filter((_,i)=>asgn[i]===g1).map(p=>p.id)),i2=new Set(parts.filter((_,i)=>asgn[i]===g2).map(p=>p.id));
      const v1=votes.filter(v=>v.statementId===st.id&&i1.has(v.participantId)),v2=votes.filter(v=>v.statementId===st.id&&i2.has(v.participantId));
      const a1=v1.length>0?v1.filter(v=>v.value===1).length/v1.length:.5,a2=v2.length>0?v2.filter(v=>v.value===1).length/v2.length:.5;
      bs+=Math.min(a1,a2)*(1+Math.sqrt((cents[g1][0]-cents[g2][0])**2+(cents[g1][1]-cents[g2][1])**2));pc++;
    }
    return{...st,bridgingScore:pc>0?bs/pc:0};
  });
}

function computePriority(st,allV){
  const sv=allV.filter(v=>v.statementId===st.id),N=sv.length;
  const pA=N>0?(1+sv.filter(v=>v.value===1).length)/(2+N):.5;
  const pP=N>0?(1+sv.filter(v=>v.value===0).length)/(2+N):.3;
  return(pA*(1-pP)*(1+Math.min(2,Math.abs(pA-.5)*4))*(1+Math.pow(2,3-N/5)))**2;
}

// ============================================================
// DEMO DATA
// ============================================================
function sampleSize(arr,n){const a=[...arr];const r=[];for(let i=0;i<Math.min(n,a.length);i++){const j=i+Math.floor(Math.random()*(a.length-i));[a[i],a[j]]=[a[j],a[i]];r.push(a[i])}return r}

function generateDemo(){
  const stmts=[
    {id:"s1",text:"Australia needs a national high-speed rail network connecting Sydney, Melbourne, Canberra, and Brisbane within 20 years",author:"Demo",phase:"dream",ts:Date.now()-100000},
    {id:"s2",text:"We should build large-scale pumped hydro storage across the Great Dividing Range to back up renewable generation",author:"Demo",phase:"dream",ts:Date.now()-99000},
    {id:"s3",text:"A continent-wide fibre and satellite broadband network should reach every community, including remote Indigenous communities",author:"Demo",phase:"dream",ts:Date.now()-98000},
    {id:"s4",text:"We need to invest heavily in seawater desalination plants along the southern coast to climate-proof our water supply",author:"Demo",phase:"dream",ts:Date.now()-97000},
    {id:"s5",text:"Australia should build a sovereign semiconductor fabrication facility to reduce dependence on global supply chains",author:"Demo",phase:"dream",ts:Date.now()-96000},
    {id:"s6",text:"Offshore wind farms in Bass Strait and the Southern Ocean should be a top priority for the next decade",author:"Demo",phase:"dream",ts:Date.now()-95000},
    {id:"s7",text:"We should build a national network of community-scale microgrids so regional towns are energy-independent",author:"Demo",phase:"dream",ts:Date.now()-94000},
    {id:"s8",text:"Major flood levee and drainage infrastructure upgrades are needed across every river system in Queensland and NSW",author:"Demo",phase:"dream",ts:Date.now()-93000},
    {id:"s9",text:"Australia should develop a domestic green hydrogen export industry with pipeline infrastructure to northern ports",author:"Demo",phase:"dream",ts:Date.now()-92000},
    {id:"s10",text:"Our cities need separated cycling and pedestrian networks built to the same standard as road infrastructure",author:"Demo",phase:"dream",ts:Date.now()-91000},
    {id:"s11",text:"We should rebuild and electrify suburban rail networks in every capital city, not just Sydney and Melbourne",author:"Demo",phase:"dream",ts:Date.now()-90000},
    {id:"s12",text:"A national recycled water network should be built so no treated wastewater reaches the ocean",author:"Demo",phase:"dream",ts:Date.now()-89000},
    {id:"s13",text:"Before building anything new, we should properly maintain and upgrade the infrastructure we already have",author:"Demo",phase:"dream",ts:Date.now()-88000},
    {id:"s14",text:"Australia should invest in small modular nuclear reactors to provide baseload power alongside renewables",author:"Demo",phase:"dream",ts:Date.now()-87000},
    {id:"s15",text:"We need a national climate adaptation infrastructure plan — sea walls, firebreaks, heat-resilient urban design — before it's too late",author:"Demo",phase:"dream",ts:Date.now()-86000},
  ];
  const parts=[],votes=[];
  // Cluster A: "Green energy / renewables" — loves offshore wind, pumped hydro, hydrogen, microgrids
  // Cluster B: "Transport / connectivity" — loves high-speed rail, broadband, cycling, electrified rail
  // Cluster C: "Water / resilience" — loves desalination, flood infrastructure, recycled water, climate adaptation
  const profiles={
    A:{count:18,bias:{s1:.5,s2:.95,s3:.5,s4:.4,s5:.35,s6:.95,s7:.9,s8:.3,s9:.9,s10:.3,s11:.4,s12:.5,s13:.3,s14:.15,s15:.6}},
    B:{count:15,bias:{s1:.95,s2:.4,s3:.95,s4:.3,s5:.7,s6:.3,s7:.5,s8:.3,s9:.35,s10:.9,s11:.95,s12:.4,s13:.6,s14:.25,s15:.5}},
    C:{count:12,bias:{s1:.4,s2:.6,s3:.6,s4:.95,s5:.4,s6:.5,s7:.6,s8:.95,s9:.4,s10:.3,s11:.4,s12:.95,s13:.7,s14:.5,s15:.95}},
  };
  const names=["Alex","Jordan","Sam","Casey","Riley","Morgan","Taylor","Quinn","Avery","Dakota","Reese","Finley","Sage","Rowan","Kai","Luca","Nico","Ash","Jude","Wren","Sky","River","Ember","Blake","Drew","Lane","Eden","Rory","Zara","Noa","Sol","Fern","Jade","Leo","Mika","Tao","Eli","Ava","Max","Ivy","Nell","Hugo","Bea","Kit","Mae"];
  let idx=0;
  for(const[,pr]of Object.entries(profiles)){
    for(let i=0;i<pr.count;i++){
      const pid=`demo_${idx}`;parts.push({id:pid,name:names[idx]||`P${idx}`,isDemo:true});
      for(const sid of sampleSize(stmts.map(s=>s.id),8+Math.floor(Math.random()*7))){
        const b=Math.max(0,Math.min(1,(pr.bias[sid]||.5)+(Math.random()-.5)*.3)),r=Math.random();
        votes.push({participantId:pid,statementId:sid,value:r<b?1:r<b+(1-b)*.7?-1:0,ts:Date.now()-Math.random()*50000});
      }
      idx++;
    }
  }
  return{statements:stmts,participants:parts,votes};
}

// ============================================================
// PICK NEXT STATEMENT
// ============================================================
function pickNext(){
  const avail=state.stmts.filter(s=>!state.votedIds.has(s.id));
  if(avail.length===0)return null;
  const ps=avail.map(s=>({s,p:computePriority(s,state.votes)}));
  const tot=ps.reduce((s,p)=>s+p.p,0);
  if(tot===0)return avail[Math.floor(Math.random()*avail.length)];
  let r=Math.random()*tot;for(const p of ps){r-=p.p;if(r<=0)return p.s}return ps[ps.length-1].s;
}

// ACTIONS
// ============================================================
function doVote(val){
  if(!state.curStmt||!state.user)return;
  state.votes.push({participantId:state.user.id,statementId:state.curStmt.id,value:val,ts:Date.now()});
  state.votedIds.add(state.curStmt.id);
  sSet("votes",state.votes);
  state.curStmt=pickNext();
  render();
}

function doSubmit(){
  const text=state.newStmt.trim();if(!text||!state.user)return;
  state.stmts.push({id:`s_${Date.now()}_${Math.random().toString(36).slice(2,6)}`,text,author:state.user.name,phase:getPhase(),ts:Date.now()});
  state.newStmt="";
  sSet("statements",state.stmts);
  render();
}

function doCommit(sid){
  if(!state.user)return;
  const ex=state.commits.findIndex(c=>c.statementId===sid&&c.userId===state.user.id);
  if(ex>=0)state.commits.splice(ex,1);
  else state.commits.push({statementId:sid,userId:state.user.id,userName:state.user.name,ts:Date.now()});
  sSet("commitments",state.commits);
  render();
}

function doJoin(){
  const name=state.nameIn.trim();if(!name)return;
  const u={id:`u_${Date.now()}_${Math.random().toString(36).slice(2,8)}`,name};
  state.parts.push(u);state.user=u;
  sSet("participants",state.parts);pSet("user",u);
  if(!state.conv){state.view="setup";render();return}
  state.isFac=u.id===state.conv.facilitatorId;
  state.tab=PC[state.conv.phase]?.defaultTab||"vote";
  state.curStmt=pickNext();
  state.view="participate";render();
}

function doCreate(){
  const topic=state.topicIn.trim();if(!topic)return;
  const demo=generateDemo();
  const c={id:`conv_${Date.now()}`,topic,phase:"dream",facilitatorId:state.user.id,createdAt:Date.now()};
  const allStmts=[...demo.statements];
  if(state.seedIn.trim())state.seedIn.split("\n").filter(Boolean).forEach((l,i)=>allStmts.push({id:`seed_${Date.now()}_${i}`,text:l.trim(),author:state.user.name,phase:"dream",ts:Date.now()}));
  state.conv=c;state.stmts=allStmts;state.votes=demo.votes;state.parts=[...demo.participants,state.user];state.isFac=true;
  sSet("conversation",c);sSet("statements",allStmts);sSet("votes",demo.votes);sSet("participants",state.parts);
  state.tab="vote";state.curStmt=pickNext();state.view="participate";render();
}

function doAdvance(){
  const idx=PHASES.indexOf(state.conv?.phase);if(idx>=PHASES.length-1)return;
  state.conv.phase=PHASES[idx+1];sSet("conversation",state.conv);
  state.tab=PC[PHASES[idx+1]].defaultTab;render();
}

function doAnalysis(){
  state.analyzing=true;render();
  setTimeout(()=>{
    try{
      const el=state.parts.filter(p=>state.votes.filter(v=>v.participantId===p.id).length>=MIN_VOTES);
      if(el.length<4||state.stmts.length<3){state.analysis={error:"Need at least 4 participants with 5+ votes and 3 statements."};state.analyzing=false;render();return}
      const sIds=state.stmts.map(s=>s.id),C=sIds.length;
      const cm=sIds.map(sid=>{const sv=state.votes.filter(v=>v.statementId===sid&&el.some(p=>p.id===v.participantId));return sv.length===0?0:sv.reduce((s,v)=>s+v.value,0)/sv.length});
      const mat=el.map(p=>{const vm={};state.votes.filter(v=>v.participantId===p.id).forEach(v=>{vm[v.statementId]=v.value});return sIds.map((sid,j)=>sid in vm?vm[sid]:cm[j])});
      const{components,projected}=powerIterationPCA(mat,2);
      const corr=projected.map((c,i)=>{const Cp=state.votes.filter(v=>v.participantId===el[i].id).length;return c.map(x=>x*Math.sqrt(C/Math.max(1,Cp)))});
      const{assignments,k,silhouette:sil}=bestKMeans(corr);
      const cons=computeConsensus(state.stmts,state.votes,el,assignments,k);
      const repr=computeRepr(state.stmts,state.votes,el,assignments,k);
      const brdg=computeBridging(state.stmts,state.votes,el,assignments,k,corr);
      const clusters=[];
      for(let g=0;g<k;g++){const mi=assignments.map((a,i)=>a===g?i:-1).filter(i=>i>=0);clusters.push({id:g,size:mi.length,members:mi.map(i=>el[i]),topStatements:repr[g]?.slice(0,3)||[],centroid:[mi.reduce((s,i)=>s+corr[i][0],0)/Math.max(1,mi.length),mi.reduce((s,i)=>s+corr[i][1],0)/Math.max(1,mi.length)]})}
      state.analysis={projected:corr,assignments,k,silhouette:sil,participants:el,clusters,consensus:cons.sort((a,b)=>b.consensusScore-a.consensusScore),repr,bridging:brdg.sort((a,b)=>b.bridgingScore-a.bridgingScore),components};
    }catch(e){state.analysis={error:e.message}}
    state.analyzing=false;render();
    if(state.analysis&&!state.analysis.error)renderMap();
  },100);
}

function doReset(){
  if(!confirm("This will clear all data. Are you sure?"))return;
  localStorage.clear();
  state={view:"welcome",conv:null,stmts:[],votes:[],parts:[],commits:[],user:null,isFac:false,analysis:null,analyzing:false,curStmt:null,votedIds:new Set(),newStmt:"",selCluster:null,nameIn:"",topicIn:"",seedIn:"",tab:"vote"};
  render();
}

const $=id=>document.getElementById(id);
const h=(tag,attrs={},children=[])=>{
  const el=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  }
  for(const c of(Array.isArray(children)?children:[children])){
    if(typeof c==="string")el.appendChild(document.createTextNode(c));
    else if(c)el.appendChild(c);
  }
  return el;
};

          h("div",{style:{width:`${(dg/tot)*100}%`,background:COLORS.disagree,height:"100%"}}),
        ]):null;
        container.appendChild(h("div",{class:"card",style:{padding:"14px 20px"}},[
          h("div",{style:{fontSize:"14px",lineHeight:"1.5",marginBottom:"8px"}},s.text),
          h("div",{style:{display:"flex",gap:"12px",alignItems:"center"}},[
            h("span",{class:"badge",style:{background:COLORS.agree+"22",color:COLORS.agree}},`▲ ${ag}`),
            h("span",{class:"badge",style:{background:COLORS.disagree+"22",color:COLORS.disagree}},`▼ ${dg}`),
            h("span",{class:"badge",style:{background:COLORS.pass+"22",color:COLORS.pass}},`— ${ps}`),
            bar,
            h("span",{class:"stat"},`by ${s.author}`),
          ]),
        ]));
      });
    });
  }

  // ======== FACILITATE TAB ========
  if(state.tab==="facilitate"&&state.isFac){
    container.appendChild(h("div",{class:"h2"},"Facilitator Controls"));
    // Phase progression
    const prog=h("div",{class:"card"},[
      h("div",{class:"h3"},"PHASE PROGRESSION"),
      h("div",{class:"phase-progress"},PHASES.map((p,i)=>{
        const cur=phase===p,past=PHASES.indexOf(phase)>i;
        return h("div",{style:{flex:"1",textAlign:"center"}},[
          h("div",{class:"phase-circle",style:{background:cur?PC[p].color:past?PC[p].color+"44":"var(--surface)",border:`2px solid ${cur?PC[p].color:past?PC[p].color+"66":"var(--border)"}`,color:cur||past?"#fff":"var(--text-dim)"}},past?"✓":PC[p].icon),
          h("div",{style:{fontSize:"12px",fontWeight:cur?"700":"400",color:cur?"var(--text)":"var(--text-dim)"}},PC[p].label),
        ]);
      })),
      h("div",{style:{background:"var(--bg)",borderRadius:"8px",padding:"16px",marginBottom:"16px"}},[
        h("div",{style:{fontWeight:"600",fontSize:"13px",marginBottom:"4px"}},`Current: ${pc.label}`),
        h("div",{style:{fontSize:"13px",color:COLORS.textMuted,lineHeight:"1.5"}},
          phase==="dream"?"Participants brainstorm freely. Move to Shape when you have enough votes for meaningful clustering.":
          phase==="shape"?"The opinion map is the focus. New submissions respond to the landscape. Move to Commit when the picture is clear.":
          phase==="commit"?"Consensus items become action items. Participants signal what they'll help with. Move to Reflect after the event.":
          "The conversation is complete. Participants review outcomes and share reflections."
        ),
      ]),
      h("button",{class:"btn btn-primary",style:{background:pc.color,opacity:phase==="reflect"?".4":"1"},onClick:doAdvance},`Advance to ${PC[PHASES[PHASES.indexOf(phase)+1]]?.label||"—"}`),
    ]);
    container.appendChild(prog);

    // Stats
    container.appendChild(h("div",{class:"card"},[
      h("div",{class:"h3"},"STATS"),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:"16px"}},
        [[state.parts.length,"Participants"],[state.stmts.length,"Statements"],[state.votes.length,"Votes"],[state.commits.length,"Commitments"]].map(([n,l])=>
          h("div",{},[h("div",{style:{fontFamily:"var(--mono)",fontSize:"28px",fontWeight:"700"}},String(n)),h("div",{class:"stat"},l)])
        )
      ),
    ]));

    container.appendChild(h("div",{class:"card"},[
      h("div",{class:"h3"},"DATA"),
      h("button",{class:"btn",onClick:doReset,style:{marginRight:"8px"}},"Reset All Data"),
    ]));
  }
}

// ============================================================
// D3 OPINION MAP
// ============================================================
function renderMap(){
  const svg=document.getElementById("opinion-map");
  if(!svg||!state.analysis||state.analysis.error)return;
  const sel=d3.select(svg);sel.selectAll("*").remove();
  const{projected:pr,assignments:as,k,participants:ps}=state.analysis;
  if(!pr?.length)return;
  const W=900,H=500,M={top:24,right:24,bottom:40,left:48};
  const xE=d3.extent(pr,d=>d[0]),yE=d3.extent(pr,d=>d[1]);
  const xP=(xE[1]-xE[0])*.1||1,yP=(yE[1]-yE[0])*.1||1;
  const x=d3.scaleLinear().domain([xE[0]-xP,xE[1]+xP]).range([M.left,W-M.right]);
  const y=d3.scaleLinear().domain([yE[0]-yP,yE[1]+yP]).range([H-M.bottom,M.top]);

  sel.append("rect").attr("width",W).attr("height",H).attr("fill",COLORS.bg).attr("rx",12);
  x.ticks(8).forEach(t=>sel.append("line").attr("x1",x(t)).attr("x2",x(t)).attr("y1",M.top).attr("y2",H-M.bottom).attr("stroke",COLORS.border).attr("stroke-width",.5));
  y.ticks(6).forEach(t=>sel.append("line").attr("x1",M.left).attr("x2",W-M.right).attr("y1",y(t)).attr("y2",y(t)).attr("stroke",COLORS.border).attr("stroke-width",.5));

  for(let g=0;g<k;g++){
    const pts=pr.map((p,i)=>as[i]===g?[x(p[0]),y(p[1])]:null).filter(Boolean);
    if(pts.length>=3){const hull=d3.polygonHull(pts);if(hull)sel.append("path").attr("d",`M${hull.map(p=>p.join(",")).join("L")}Z`).attr("fill",COLORS.cluster[g%5]+"10").attr("stroke",COLORS.cluster[g%5]+"40").attr("stroke-width",1.5).attr("stroke-dasharray","4,4")}
  }

  pr.forEach((p,i)=>{
    const g=as[i],s=state.selCluster===null||state.selCluster===g,me=ps[i]?.id===state.user?.id;
    const circle=sel.append("circle").attr("cx",x(p[0])).attr("cy",y(p[1])).attr("r",me?7:4)
      .attr("fill",s?COLORS.cluster[g%5]:COLORS.border).attr("stroke",me?"#fff":"none").attr("stroke-width",me?2:0).attr("opacity",s?.8:.2).style("cursor","pointer");
    circle.append("title").text(`${ps[i]?.name||"?"} (Group ${g+1})`);
  });

  sel.append("text").attr("x",W/2).attr("y",H-6).attr("text-anchor","middle").attr("fill",COLORS.textDim).attr("font-size",11).attr("font-family","var(--mono)").text("← PC1 →");
  sel.append("text").attr("x",14).attr("y",H/2).attr("text-anchor","middle").attr("fill",COLORS.textDim).attr("font-size",11).attr("font-family","var(--mono)").attr("transform",`rotate(-90,14,${H/2})`).text("← PC2 →");
}

// ============================================================
// INIT
// ============================================================
(function init(){
  const c=sGet("conversation");
  if(c){
    state.conv=c;
    state.stmts=sGet("statements")||[];
    state.votes=sGet("votes")||[];
    state.parts=sGet("participants")||[];
    state.commits=sGet("commitments")||[];
    const u=pGet("user");
    if(u){
      state.user=u;state.isFac=u.id===c.facilitatorId;
      state.votedIds=new Set(state.votes.filter(v=>v.participantId===u.id).map(v=>v.statementId));
      state.tab=PC[c.phase]?.defaultTab||"vote";
      state.curStmt=pickNext();
      state.view="participate";
    }else state.view="welcome";
  }else state.view="welcome";
  render();
})();
</script>
